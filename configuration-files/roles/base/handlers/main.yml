---
- name: restart ssh.socket
  when: ssh_socket_is_active.rc == 0
  systemd_service:
    name: ssh.socket
    state: restarted
    daemon_reload: true

- name: restart ssh
  service:
    name: ssh
    state: restarted

- name: firewall | apply ruleset
  systemd_service:
    name: nftables
    state: reloaded

- name: apply netplan
  command: sudo netplan apply
  async: 45
  poll: 0
